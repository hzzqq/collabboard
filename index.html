<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>CollabBoard · 实时协作白板</title>
<style>
  :root{ --bg:#0a0c10; --panel:#12161d; --line:#1f2730; --txt:#cdd6e0; --accent:#f78c6c; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:ui-monospace,Menlo,Consolas,monospace;overflow:hidden;}
  #app{display:flex;height:100%;}
  #panel{width:240px;background:var(--panel);border-right:1px solid var(--line);
    padding:18px 16px;overflow-y:auto;}
  #panel h1{font-size:15px;margin:0 0 2px;}
  #panel .sub{font-size:11px;color:#6b7888;margin-bottom:14px;}
  .row{margin:12px 0;}
  .row label{display:block;font-size:12px;color:#9fb0c0;margin-bottom:6px;}
  .tools{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  button{background:#1a222c;color:var(--txt);border:1px solid var(--line);
    border-radius:6px;padding:8px;font:inherit;cursor:pointer;transition:.15s;}
  button:hover{border-color:var(--accent);color:var(--accent);}
  button.on{background:var(--accent);color:#2a0f06;border-color:var(--accent);font-weight:700;}
  input[type=color]{width:100%;height:34px;background:#0c0f14;border:1px solid var(--line);border-radius:6px;}
  input[type=range]{width:100%;}
  input[type=text]{width:100%;background:#0c0f14;color:var(--txt);border:1px solid var(--line);
    border-radius:6px;padding:7px 8px;font:inherit;}
  .val{float:right;color:var(--accent);}
  #stage{flex:1;position:relative;}
  canvas{display:block;background:#0e1118;cursor:crosshair;}
  #cv{position:absolute;inset:0;width:100%;height:100%;}
  #overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  #status{position:absolute;left:14px;top:12px;font-size:12px;z-index:5;
    background:rgba(10,12,16,.6);padding:6px 10px;border:1px solid var(--line);border-radius:8px;}
  #status b{color:var(--accent);}
  .hint{font-size:11px;color:#6b7888;line-height:1.6;margin-top:14px;border-top:1px solid var(--line);padding-top:12px;}
  code{color:#9fb0c0;}
  #chatPanel{width:240px;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;}
  #chatPanel h2{font-size:14px;margin:0;padding:14px 16px 8px;color:var(--accent);}
  #chatLog{flex:1;overflow-y:auto;padding:0 14px;font-size:12px;line-height:1.6;}
  #chatLog .msg{margin-bottom:8px;word-break:break-word;}
  #chatLog .msg b{color:var(--accent);}
  #chatLog .sys{color:#6b7888;font-style:italic;margin-bottom:8px;}
  #chatInput{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--line);}
  #chatInput input{flex:1;}
  #roster{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
  #roster span{background:#1a222c;border:1px solid var(--line);border-radius:10px;padding:2px 8px;}
  .roomlist{display:flex;flex-direction:column;gap:6px;}
  .roomlist .muted{color:#6b7888;font-style:italic;font-size:11px;}
  .rroom{display:flex;justify-content:space-between;align-items:center;background:#1a222c;border:1px solid var(--line);
    border-radius:8px;padding:6px 10px;cursor:pointer;}
  .rroom:hover{border-color:var(--accent);}
  .rroom.cur{opacity:.6;cursor:default;border-style:dashed;}
  .rroom .rn{color:var(--accent);font-weight:600;}
  .rroom .rc{color:#6b7888;font-size:11px;}
</style>
</head>
<body>
<div id="app">
  <div id="panel">
    <h1>CollabBoard</h1>
    <div class="sub">实时协作白板 · 零依赖 WS</div>
    <div class="row">
      <label>昵称</label>
      <div style="display:flex;gap:6px;">
        <input type="text" id="name" placeholder="你的昵称" maxlength="24" />
        <button id="setName">设置</button>
      </div>
    </div>
    <div class="row">
      <label>在线 (<b id="online2">1</b>)</label>
      <div id="roster"></div>
    </div>
    <div class="row tools">
      <button data-tool="pen" class="on">画笔</button>
      <button data-tool="line">直线</button>
      <button data-tool="rect">矩形</button>
      <button data-tool="ellipse">椭圆</button>
      <button data-tool="text">文字</button>
      <button data-tool="eraser">橡皮</button>
      <button data-tool="select">选择/移动</button>
      <button id="clear">清屏</button>
    </div>
    <div class="row">
      <label>颜色</label>
      <input type="color" id="color" value="#f78c6c" />
    </div>
    <div class="row">
      <label>粗细 <span class="val" id="wVal">4</span></label>
      <input type="range" id="width" min="1" max="40" value="4" />
    </div>
    <div class="row">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
        <input type="checkbox" id="fill" /> 填充形状（矩形/椭圆）
      </label>
    </div>
    <div class="row tools">
      <button id="undo">↶ 撤销</button>
      <button id="redo">↷ 重做</button>
    </div>
    <div class="row">
      <label>房间 ROOM</label>
      <input type="text" id="room" placeholder="main" />
      <button id="join" style="margin-top:6px;">切换房间</button>
    </div>
    <div class="row">
      <label>活跃房间</label>
      <div id="roomList" class="roomlist"><span class="muted">（加载中…）</span></div>
    </div>
    <div class="row">
      <label>房间锁定 <span id="lockState" class="val"></span></label>
      <div class="tools">
        <button id="lockBtn">🔒 锁定</button>
        <button id="unlockBtn">🔓 解锁</button>
      </div>
      <div style="font-size:11px;color:#6b7888;margin-top:6px;">房主：<span id="ownerName">—</span></div>
    </div>
    <div class="row"><button id="save">保存 PNG</button></div>
    <div class="row"><button id="copy">复制邀请链接</button></div>
    <div class="row"><button id="export">导出白板 JSON</button></div>
    <div class="hint">
      多人打开<b>同一房间</b>即可实时同步（含光标）。服务端 <code>server.js</code> 用 Node 原生
      <code>net</code> 手写 WebSocket，按房间隔离广播。<br><br>
      右侧聊天栏可与同房间伙伴对话；左栏可设置<b>昵称</b>、查看<b>在线名单</b>。<br><br>
      启动：<code>node server.js</code><br>
      快捷键：<code>Ctrl+Z</code> 撤销 / <code>Ctrl+Y</code> 重做<br>
      「选择/移动」工具可拖动已画元素（文字/图形整体平移，松手同步他人）
    </div>
  </div>
  <div id="stage">
    <div id="status">房间 <b id="roomName">main</b> · 连接 <b id="conn">未连接</b> · 在线 <b id="online">1</b></div>
    <canvas id="cv"></canvas>
    <canvas id="overlay"></canvas>
  </div>
  <div id="chatPanel">
    <h2>聊天</h2>
    <div id="chatLog"></div>
    <div id="typing" class="sys"></div>
    <div id="chatInput">
      <input type="text" id="chatText" placeholder="说点什么…(回车发送)" maxlength="500" />
      <button id="chatSend">发送</button>
    </div>
  </div>
</div>
<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const ov = document.getElementById('overlay');
const octx = ov.getContext('2d');
const stage = document.getElementById('stage');
let dpr = Math.min(devicePixelRatio || 1, 2);

let myId = Math.random().toString(36).slice(2, 8);
const MY_COLORS = ['#f78c6c','#7ee787','#82aaff','#c792ea','#ffcb6b','#f07178'];
let myColor = MY_COLORS[Math.floor(Math.random()*MY_COLORS.length)];
const remoteCursors = new Map();
let myName = '我' + myId.slice(0, 3);

const $ = id => document.getElementById(id);
const room0 = new URLSearchParams(location.search).get('room') || 'main';
$('room').value = room0;
$('name').value = myName;

function resize(){
  const w = stage.clientWidth, h = stage.clientHeight;
  cv.width = w*dpr; cv.height = h*dpr; cv.style.width = w+'px'; cv.style.height = h+'px';
  ov.width = w*dpr; ov.height = h*dpr; ov.style.width = w+'px'; ov.style.height = h+'px';
  redraw(); drawCursors();
}
window.addEventListener('resize', resize);

// ---------- 撤销/重做 (快照式) ----------
let strokes = [];
let history = [[]]; let hptr = 0;
const clone = s => s.map(x => ({ ...x, points: x.points ? x.points.map(p => ({ ...p })) : undefined }));
function snapshot(){ history = history.slice(0, hptr+1); history.push(clone(strokes)); hptr++; }

// ---------- 绘制 ----------
function drawStroke(s){
  ctx.save();
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.lineWidth = s.width * dpr;
  ctx.strokeStyle = s.color; ctx.fillStyle = s.color;
  if(s.type === 'text'){
    ctx.font = (Math.max(10, s.width) * dpr) + 'px ui-monospace, monospace';
    ctx.textBaseline = 'top';
    ctx.fillText(s.text || '', s.x * dpr, s.y * dpr);
    ctx.restore(); return;
  }
  if(s.erase) ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  const p = s.points;
  if(s.tool === 'pen' || s.tool === 'eraser'){
    ctx.moveTo(p[0].x*dpr, p[0].y*dpr);
    for(let i=1;i<p.length;i++) ctx.lineTo(p[i].x*dpr, p[i].y*dpr);
    ctx.stroke();
  } else if(s.tool === 'line'){
    ctx.moveTo(p[0].x*dpr, p[0].y*dpr); ctx.lineTo(p[1].x*dpr, p[1].y*dpr); ctx.stroke();
  } else if(s.tool === 'rect'){
    const x=Math.min(p[0].x,p[1].x)*dpr, y=Math.min(p[0].y,p[1].y)*dpr;
    const w=Math.abs(p[1].x-p[0].x)*dpr, h=Math.abs(p[1].y-p[0].y)*dpr;
    if(s.fill) ctx.fillRect(x,y,w,h); else ctx.strokeRect(x,y,w,h);
  } else if(s.tool === 'ellipse'){
    const cx=((p[0].x+p[1].x)/2)*dpr, cy=((p[0].y+p[1].y)/2)*dpr;
    const rx=Math.abs(p[1].x-p[0].x)/2*dpr, ry=Math.abs(p[1].y-p[0].y)/2*dpr;
    ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
    if(s.fill) ctx.fill(); else ctx.stroke();
  }
  ctx.restore();
}
function redraw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  for(const s of strokes) drawStroke(s);
  if(current) drawStroke(current);
}
function drawCursors(){
  octx.clearRect(0,0,ov.width,ov.height);
  const now = Date.now();
  for(const [id, c] of remoteCursors){
    if(now - c.ts > 4000) continue;
    const x = c.x*dpr, y = c.y*dpr;
    octx.save();
    octx.fillStyle = c.color || '#fff';
    octx.beginPath();
    octx.moveTo(x, y); octx.lineTo(x, y+16); octx.lineTo(x+5, y+12); octx.lineTo(x+11, y+11);
    octx.closePath(); octx.fill();
    octx.font = (12*dpr)+'px ui-monospace, monospace';
    octx.fillText(id, x+13, y+12);
    octx.restore();
  }
}
setInterval(drawCursors, 1000);

// ---------- 选择 / 移动 ----------
let localSeq = 0;   // 客户端生成元素 id（与服务端保持一致，便于移动引用）
function translateLocal(el, dx, dy){
  if(!el) return;
  if(el.type === 'text'){ el.x += dx; el.y += dy; }
  else if(Array.isArray(el.points)){ for(const p of el.points){ p.x += dx; p.y += dy; } }
}
// 命中测试：从顶层（数组末尾）优先，返回最上层命中的元素（含 8px 容差）
function hitTest(x, y){
  for(let i = strokes.length - 1; i >= 0; i--){
    const s = strokes[i];
    if(!s || s.id == null) continue;
    let bb;
    if(s.type === 'text'){
      const w = (s.text ? s.text.length : 1) * Math.max(10, s.width) * 0.6;
      const h = Math.max(12, s.width) * 1.2;
      bb = { x: s.x, y: s.y, w, h };
    } else if(Array.isArray(s.points) && s.points.length){
      let minx=Infinity, miny=Infinity, maxx=-Infinity, maxy=-Infinity;
      for(const p of s.points){ if(p.x<minx)minx=p.x; if(p.y<miny)miny=p.y; if(p.x>maxx)maxx=p.x; if(p.y>maxy)maxy=p.y; }
      bb = { x:minx, y:miny, w:maxx-minx, h:maxy-miny };
    } else continue;
    const pad = 8;
    if(x >= bb.x-pad && x <= bb.x+bb.w+pad && y >= bb.y-pad && y <= bb.y+bb.h+pad) return s;
  }
  return null;
}

// ---------- 指针交互 ----------
let drawing = false, current = null, tool = 'pen', color = '#f78c6c', width = 4, fill = false;
let dragging = false, dragEl = null, startX = 0, startY = 0, lastX = 0, lastY = 0;
function pos(e){ const r = cv.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top, p:(typeof e.pressure==='number' ? e.pressure : 0.5) }; }
cv.addEventListener('pointerdown', e=>{
  const p = pos(e);
  if(tool === 'select'){
    const hit = hitTest(p.x, p.y);
    if(hit){ dragging = true; dragEl = hit; startX = lastX = p.x; startY = lastY = p.y; cv.setPointerCapture(e.pointerId); }
    return;
  }
  drawing = true; cv.setPointerCapture(e.pointerId);
  current = { tool, color, width, erase: tool==='eraser', fill, points:[p] };
  if(tool==='line'||tool==='rect'||tool==='ellipse') current.points.push(p);
});
cv.addEventListener('pointermove', e=>{
  // 广播光标
  if(ws && ws.readyState===1){
    const p = pos(e);
    const now = performance.now();
    if(now - lastCursor > 30){ lastCursor = now; send({ type:'cursor', id:myId, color:myColor, x:p.x, y:p.y }); }
  }
  // 选择模式下拖动已命中的元素（实时预览，松手才发一次总位移）
  if(dragging && dragEl){
    const p = pos(e);
    const dx = p.x - lastX, dy = p.y - lastY;
    translateLocal(dragEl, dx, dy);
    lastX = p.x; lastY = p.y; redraw();
    return;
  }
  if(!drawing) return;
  const p2 = pos(e);
  if(tool==='pen'||tool==='eraser') current.points.push(p2);
  else current.points[1] = p2;
  redraw();
});
cv.addEventListener('pointerup', ()=>{
  if(dragging && dragEl){
    dragging = false;
    const tdx = lastX - startX, tdy = lastY - startY;
    if(tdx !== 0 || tdy !== 0) send({ type:'move', id: dragEl.id, dx: tdx, dy: tdy });
    dragEl = null; redraw(); return;
  }
  if(!drawing) return; drawing = false;
  if(current && current.tool === 'text'){
    const t = (typeof prompt === 'function') ? prompt('输入文字：') : null;
    if(t && t.trim()){
      current.text = t.trim();
      current.id = myId + ':' + (++localSeq);
      strokes.push(current); snapshot();
      send({ type:'text', text: current.text, id: current.id, x: current.points[0].x, y: current.points[0].y, color, width });
    }
    current = null; redraw(); return;
  }
  if(current){
    current.id = myId + ':' + (++localSeq);
    const isEmpty = current.points.length<2 || (current.points.length===2 && current.tool!=='pen' && current.tool!=='eraser' && current.points[0].x===current.points[1].x && current.points[0].y===current.points[1].y);
    if(!isEmpty){
      strokes.push(current); snapshot(); send({ type:'stroke', stroke:current });
    }
  }
  current = null; redraw();
});

// ---------- 控件 ----------
document.querySelectorAll('[data-tool]').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('[data-tool]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); tool = b.dataset.tool;
    cv.style.cursor = (tool === 'select') ? 'move' : 'crosshair';
  };
});
$('color').oninput = e=> color = e.target.value;
$('width').oninput = e=>{ width=+e.target.value; $('wVal').textContent=width; };
$('fill').onchange = e=> fill = e.target.checked;
$('clear').onclick = ()=>{ strokes=[]; current=null; history=[[]]; hptr=0; redraw(); send({type:'clear'}); };
$('undo').onclick = undo;
$('redo').onclick = redo;
$('join').onclick = ()=>{ manualLeave = true; clearTimeout(reconnectTimer); const v=$('room').value.trim()||'main'; location.search='?room='+encodeURIComponent(v); };
$('save').onclick = ()=>{
  const a=document.createElement('a'); a.download='collabboard.png'; a.href=cv.toDataURL('image/png'); a.click();
};
$('copy').onclick = async ()=>{
  try{ await navigator.clipboard.writeText(location.href); $('copy').textContent='已复制 ✓'; setTimeout(()=>$('copy').textContent='复制邀请链接',1500);}catch(e){}
};
$('export').onclick = ()=>{
  const a = document.createElement('a');
  a.download = 'collabboard_' + (room0 || 'main') + '.json';
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify({ room: room0, strokes }));
  a.click();
};
window.addEventListener('keydown', e=>{
  if(e.ctrlKey && (e.key==='z'||e.key==='Z') && !e.shiftKey){ e.preventDefault(); undo(); }
  else if(e.ctrlKey && (e.key==='y'||e.key==='Y' || (e.shiftKey && (e.key==='z'||e.key==='Z')))){ e.preventDefault(); redo(); }
});

function undo(){ send({type:'undo'}); }     // 撤销/重做改为服务端权威快照栈，跨端同步
function redo(){ send({type:'redo'}); }

// ---------- 昵称 / 在线名单 / 聊天 ----------
function addChat(text, who, isSys){
  const log = $('chatLog');
  const div = document.createElement('div');
  div.className = 'msg' + (isSys ? ' sys' : '');
  div.textContent = (who ? who + '：' : '') + text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
function renderRoster(names){
  const r = $('roster'); r.innerHTML = '';
  $('online').textContent = names.length;
  $('online2').textContent = names.length;
  for(const n of names){
    const s = document.createElement('span');
    s.textContent = (n === myName ? n + '(我)' : n);
    r.appendChild(s);
  }
}
// 渲染活跃房间列表（来自服务端 room_list 广播）；点击可一键切换到该房间
function renderRoomList(rooms){
  const el = $('roomList'); if(!el) return;
  el.innerHTML = '';
  if(!rooms.length){ el.innerHTML = '<span class="muted">（暂无其他房间）</span>'; return; }
  const cur = new URLSearchParams(location.search).get('room') || 'main';
  for(const rm of rooms){
    const item = document.createElement('div');
    item.className = 'rroom' + (rm.name === cur ? ' cur' : '');
    item.innerHTML = '<span class="rn"></span><span class="rc">·' + rm.clients + '人在线 ·' + rm.strokes + '笔</span>';
    item.querySelector('.rn').textContent = rm.name;
    if(rm.name !== cur){
      item.onclick = ()=>{ location.search = '?room=' + encodeURIComponent(rm.name); };
    }
    el.appendChild(item);
  }
}
function setName(){
  const v = $('name').value.trim().slice(0, 24);
  if(!v) return;
  myName = v;
  send({ type:'set_name', name: myName });
  addChat('你已改名为 ' + myName, '', true);
}
$('setName').onclick = setName;
$('name').addEventListener('keydown', e=>{ if(e.key==='Enter') setName(); });
function sendChat(){
  const t = $('chatText').value.trim();
  if(!t) return;
  addChat(t, myName);                 // 本地立即显示
  send({ type:'chat', text: t });     // 服务端转发给其他人
  $('chatText').value = '';
  sendTyping(false);
}
let amTyping = false, typingTimer = null;
function sendTyping(on){
  if(amTyping === on) return;
  amTyping = on; send({ type:'typing', on });
}
$('chatText').addEventListener('input', ()=>{
  sendTyping(true);
  clearTimeout(typingTimer);
  typingTimer = setTimeout(()=> sendTyping(false), 2000);   // 静默 2s 自动收起
});
$('chatText').addEventListener('blur', ()=> sendTyping(false));
$('chatSend').onclick = sendChat;
$('chatText').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); sendChat(); } });

// ---------- WebSocket 同步 ----------
let ws = null, online = 1, lastCursor = 0;
let manualLeave = false;          // 主动离开/切换房间时不自动重连
let reconnectTimer = null;
let reconnectDelay = 1500;        // 重连退避（毫秒），成功后重置，上限 8s
function send(obj){ if(ws && ws.readyState===1) ws.send(JSON.stringify(obj)); }
function scheduleReconnect(){
  if(manualLeave) return;
  $('conn').textContent = '重连中…';
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(()=>{ reconnectDelay = Math.min(reconnectDelay * 2, 8000); connect(); }, reconnectDelay);
}
function connect(){
  const room = new URLSearchParams(location.search).get('room') || 'main';
  $('roomName').textContent = room;
  manualLeave = false;
  try{
    ws = new WebSocket('ws://' + (location.hostname || 'localhost') + ':8080/?room=' + encodeURIComponent(room));
  }catch(e){ scheduleReconnect(); return; }
  ws.onopen = ()=>{ $('conn').textContent='已连接'; reconnectDelay = 1500; send({type:'set_name', name: myName}); send({type:'cursor', id:myId, color:myColor, x:-99, y:-99}); };
  ws.onclose = ()=>{ if(manualLeave){ $('conn').textContent='已离开'; } else { scheduleReconnect(); } };
  ws.onerror = ()=>{ /* 错误后浏览器会触发 onclose，由 onclose 统一调度重连 */ };
  ws.onmessage = ev=>{
    const m = JSON.parse(ev.data);
    switch(m.type){
      case 'stroke':
        strokes.push(m.stroke); history = history.slice(0,hptr+1); history.push(clone(strokes)); hptr++; redraw(); break;
      case 'text':
        strokes.push(m); history = history.slice(0,hptr+1); history.push(clone(strokes)); hptr++; redraw(); break;
      case 'move':
        {
          const el = strokes.find(s => s && s.id === m.id);
          if(el){ translateLocal(el, m.dx, m.dy); redraw(); }
        }
        break;
      case 'replace':
        strokes = clone(m.strokes||[]); history=[clone(strokes)]; hptr=0; redraw(); break;
      case 'clear':
        strokes=[]; history=[[]]; hptr=0; redraw(); break;
      case 'welcome':
        myId = m.id; myColor = m.color; break;
      case 'snapshot':
        strokes = clone(m.strokes||[]); history=[clone(strokes)]; hptr=0; redraw();
        $('chatLog').innerHTML = '';
        for(const c of (m.chats||[])) addChat(c.text, c.name);
        break;
      case 'cursor':
        if(m.id !== myId){ remoteCursors.set(m.id, { x:m.x, y:m.y, color:m.color, ts:Date.now() }); drawCursors(); }
        break;
      case 'chat':
        if(m.name !== myName) addChat(m.text, m.name); break;
      case 'typing':
        if(m.id !== myId){ $('typing').textContent = (m.on ? ((m.name || '某人') + ' 正在输入…') : ''); }
        break;
      case 'presence':
        $('online').textContent = m.count;
        if(Array.isArray(m.names)) renderRoster(m.names);
        break;
      case 'room_list':
        renderRoomList(m.rooms || []);
        break;
      case 'owner':
        roomOwner = m.owner; roomLocked = !!m.locked; updateLockUI(); break;
      case 'lock':
        roomLocked = !!m.locked; updateLockUI();
        addChat(m.locked ? '房间已被锁定，仅房主可编辑' : '房间已解锁', '', true);
        break;
      case 'error':
        addChat('⚠ ' + (m.msg || '操作被拒绝'), '', true); break;
    }
  };
}
// 房间锁定 UI 同步
let roomOwner = null, roomLocked = false;
function updateLockUI(){
  const me = (roomOwner === myId);
  $('lockState').textContent = roomLocked ? '🔒' : '🔓';
  $('ownerName').textContent = roomOwner == null ? '—' : (me ? '我(房主)' : roomOwner);
  $('lockBtn').disabled = !me || roomLocked;
  $('unlockBtn').disabled = !me || !roomLocked;
  $('lockBtn').style.opacity = (!me || roomLocked) ? .45 : 1;
  $('unlockBtn').style.opacity = (!me || !roomLocked) ? .45 : 1;
}
$('lockBtn').onclick = ()=> send({ type:'lock' });
$('unlockBtn').onclick = ()=> send({ type:'unlock' });
connect();
resize();
</script>
